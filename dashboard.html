<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class="dash-body">

<nav class="top-nav">

    <div class="nav-brand">
        <div class="mini-logo small">M</div>

        <div>
            <strong>MWAMINI</strong>
            <span>CHATTING SITE</span>
        </div>
    </div>

    <div class="nav-profile">
        <span id="userNameDisplay">Loading...</span>

        <button id="logoutBtn" class="btn-logout">
            Logout
        </button>
    </div>

</nav>

<div class="workspace">

    <aside class="col-left">

        <h3>Groups</h3>

        <div class="group-item active">
            👥 General Room
        </div>

        <div class="group-item">
            🔒 Secure Room
        </div>

        <div class="group-item">
            ⚡ Developers
        </div>

    </aside>

    <main class="col-main">

        <header class="chat-header">
            <h2>Realtime Encrypted Chat</h2>
        </header>

        <div id="messageFeed" class="chat-feed"></div>

        <form id="chatInputForm" class="chat-input">

            <input
                type="text"
                id="messageInput"
                placeholder="Type secure message..."
</html>
