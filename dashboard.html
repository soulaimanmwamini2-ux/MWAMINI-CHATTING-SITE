<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dash-body">
    <div class="layout">
        <main class="center">
            <div id="chatBox" style="height: 400px; border: 1px solid #ccc; overflow-y: scroll;"></div>
            <input id="msgInput" placeholder="Message...">
            <button id="sendBtn">Send</button>
        </main>
        <aside class="right">
            <h3>Status</h3>
            <div id="statusContainer"></div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Send Message
        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('msgInput');
            await addDoc(collection(db, "messages"), { text: input.value, time: serverTimestamp() });
            input.value = "";
        };

        // Display Messages
        onSnapshot(query(collection(db, "messages"), orderBy("time", "asc")), (snap) => {
            const box = document.getElementById('chatBox');
            box.innerHTML = "";
            snap.forEach(doc => {
                box.innerHTML += `<div>${doc.data().text}</div>`;
            });
        });
    </script>
</body>
</html>
