<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body class="dash-body">
<div class="layout">
    <aside class="left">
        <div id="groupList"></div>
        <button onclick="App.createGroup(prompt('Enter Name:'))">+ New Group</button>
        <input id="inviteEmail" placeholder="Member Email">
        <button onclick="App.addMember(window.activeGroupId, document.getElementById('inviteEmail').value)">Invite</button>
    </aside>
    <main class="center">
        <div id="chatBox"></div>
        <form id="msgForm"><input id="msgInput"><button type="submit">Send</button></form>
    </main>
</div>
<script type="module">
    import { App } from './app.js';
    App.init();
</script>
</body>
</html>
