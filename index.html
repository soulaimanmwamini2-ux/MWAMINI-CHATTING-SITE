<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>MWAMINI SIGNUP</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="auth-wrapper">
    <form id="signupForm">
        <input type="text" id="name" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="pass" placeholder="Password" required>
        <button type="submit">Initialize Account</button>
    </form>
</div>
<script type="module">
    import { Auth } from './auth.js';
    document.getElementById("signupForm").onsubmit = e => {
        e.preventDefault();
        Auth.register(document.getElementById("email").value, document.getElementById("pass").value, document.getElementById("name").value);
    };
</script>
</body>
</html>
