<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHATTING SITE</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="cover-body">

<div class="auth-wrapper">

    <div class="auth-branding">

        <div class="logo-box">M</div>

        <h1>
            HIGH PRIVACY,<br>
            YOUR DATA ENCRYPTED
        </h1>

        <p class="subtitle">
            Secure realtime communication system.
        </p>

        <p class="description">
            MWAMINI CHATTING SITE provides encrypted communication,
            modern messaging infrastructure and realtime Firebase synchronization.
        </p>

    </div>

    <div class="auth-panel">

        <div class="panel-header">
            <div class="mini-logo">M</div>
            <h2>
                MWAMINI<br>
                <span>CHATTING SITE</span>
            </h2>
        </div>

        <form id="loginForm" class="form-content">

            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="Enter Email" required>

            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter Password" required>

            <button type="submit" class="btn-primary">
                Sign In
            </button>

            <p class="toggle-text">
                New User?
                <span id="toSignup">Create Account</span>
            </p>

        </form>

        <form id="signupForm" class="form-content hidden">

            <label>Username</label>
            <input type="text" id="signupName" placeholder="Username" required>

            <label>Email Address</label>
            <input type="email" id="signupEmail" placeholder="Email" required>

            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Password" required>

            <button type="submit" class="btn-primary">
</html>
