<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT WEB - Auth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <h1>MWAMINI CHAT WEB</h1>
        <div id="alert-box" class="hidden"></div>
        
        <div class="tabs">
            <button id="tab-login" class="active">Login</button>
            <button id="tab-register">Register</button>
        </div>

        <form id="login-form" class="auth-form">
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden">
            <input type="text" id="reg-name" placeholder="Display Name" required>
            <input type="email" id="reg-email" placeholder="Email" required>
            <input type="password" id="reg-password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <div class="guest-section">
            <button id="guest-login-btn" class="secondary-btn">Continue as Guest</button>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
