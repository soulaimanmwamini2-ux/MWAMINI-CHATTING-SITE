<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWAMINI CHAT - Secure Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="cover-body">

<div class="auth-wrapper">
    <div class="auth-branding">
        <div class="brand-logo">M</div>
        <h1>HIGH PRIVACY<br>ENCRYPTED CHAT</h1>
        <p>Secure communication system built for absolute control and privacy.</p>
    </div>

    <div class="auth-panel">
        <div class="tabs">
            <button id="showLogin" class="active">Login</button>
            <button id="showSignup">Signup</button>
        </div>

        <!-- Status/Notification Messages -->
        <div id="authAlert" class="auth-alert hidden"></div>

        <!-- LOGIN FORM -->
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <!-- SIGNUP FORM -->
        <form id="signupForm" class="hidden">
            <input type="text" id="signupName" placeholder="Username" required>
            <input type="email" id="signupEmail" placeholder="Email Address" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>

        <div class="divider"><span>OR</span></div>
        <button id="guestBtn" class="btn-secondary">Continue as Guest</button>
    </div>
</div>

<script type="module">
    import { Auth } from './js/auth.js';

    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const showLogin = document.getElementById("showLogin");
    const showSignup = document.getElementById("showSignup");
    const guestBtn = document.getElementById("guestBtn");
    const authAlert = document.getElementById("authAlert");

    // UI Tab Switching Logic
    showLogin.onclick = () => {
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
        showLogin.classList.add("active");
        showSignup.classList.remove("active");
    };

    showSignup.onclick = () => {
        signupForm.classList.remove("hidden");
        loginForm.classList.add("hidden");
        showSignup.classList.add("active");
        showLogin.classList.remove("active");
    };

    // Form Handling
    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        try {
            await Auth.login(document.getElementById("loginEmail").value, document.getElementById("loginPassword").value);
        } catch (err) {
            showAlert(err.message, "error");
        }
    };

    signupForm.onsubmit = async (e) => {
        e.preventDefault();
        try {
            await Auth.register(
                document.getElementById("signupEmail").value, 
                document.getElementById("signupPassword").value, 
                document.getElementById("signupName").value
            );
            showAlert("Verification email sent! Please check your inbox before logging in.", "success");
            showLogin.click();
        } catch (err) {
            showAlert(err.message, "error");
        }
    };

    guestBtn.onclick = async () => {
        try {
            await Auth.loginAsGuest();
        } catch (err) {
            showAlert(err.message, "error");
        }
    };

    function showAlert(msg, type) {
        authAlert.innerText = msg;
        authAlert.className = `auth-alert ${type}`;
    }

    // Monitor auth state changes to protect paths
    Auth.onAuth((user) => {
        if (user) {
            if (user.isAnonymous || user.emailVerified) {
                location.href = "dashboard.html";
            } else {
                showAlert("Please verify your email address via the link sent to your inbox.", "error");
            }
        }
    });
</script>

</body>
</html>
