<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MWAMINI CHAT - Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cover-body">
    <div class="auth-wrapper">
        <div class="auth-branding"><h1>MWAMINI CHAT</h1><p>Secure Portal</p></div>
        <div class="auth-panel">
            <div id="authAlert" class="auth-alert hidden"></div>
            <form id="loginForm">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            <button id="guestBtn" class="btn-secondary">Continue as Guest</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
                window.location.href = "dashboard.html";
            } catch(err) { alert(err.message); }
        };

        document.getElementById('guestBtn').onclick = async () => {
            await signInAnonymously(auth);
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>
